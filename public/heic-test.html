<!DOCTYPE html>
<html><head><title>HEIC Decode Test</title></head>
<body>
<h2>HEIC Decoder Test Page</h2>
<p>Drag a HEIC file onto the box below, or click to select.</p>
<div id="drop" style="border:2px dashed #999;padding:60px;text-align:center;margin:20px;cursor:pointer">
  Drop HEIC here or click
  <input type="file" id="fi" style="display:none" accept="image/*,.heic,.heif">
</div>
<pre id="log" style="background:#222;color:#0f0;padding:16px;min-height:200px;white-space:pre-wrap;font-size:13px"></pre>
<script>
var L = document.getElementById('log');
function log(msg) { L.textContent += msg + '\n'; console.log(msg); }

function handleFile(file) {
  log('\n=== Testing: ' + file.name + ' (' + (file.size/1024).toFixed(1) + 'KB, type: ' + file.type + ') ===');

  // Test 1: Native
  log('\n[1] Native decode (blob URL → Image)...');
  var url = URL.createObjectURL(file);
  var img = new Image();
  img.onload = function() {
    log('[1] SUCCESS: ' + img.naturalWidth + 'x' + img.naturalHeight);
    URL.revokeObjectURL(url);
    log('\nRESULT: Native decode works!');
  };
  img.onerror = function() {
    URL.revokeObjectURL(url);
    log('[1] FAILED');
    testLibheif(file);
  };
  img.src = url;
}

function testLibheif(file) {
  log('\n[2] Loading libheif-js v1.19.8 WASM (1.39MB)...');
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/libheif-js@1.19.8/libheif-wasm/libheif-bundle.js';
  s.async = true;
  s.onload = function() {
    log('[2] Script loaded! typeof libheif: ' + typeof libheif);
    log('[2] Calling libheif() to init WASM module...');
    var mod;
    try {
      mod = libheif();
      log('[2] Module created! typeof HeifDecoder: ' + typeof mod.HeifDecoder);
    } catch(e) {
      log('[2] Module init FAILED: ' + e.message);
      log('\nRESULT: ALL decoders failed.');
      return;
    }
    if (typeof mod.HeifDecoder !== 'function') {
      log('[2] ERROR: HeifDecoder not found');
      log('\nRESULT: ALL decoders failed.');
      return;
    }
    log('[2] Reading file...');
    var reader = new FileReader();
    reader.onload = function() {
      var buf = new Uint8Array(reader.result);
      log('[2] Read ' + buf.length + ' bytes. Creating decoder...');
      try {
        var decoder = new mod.HeifDecoder();
        log('[2] Decoder created! Decoding...');
        var images = decoder.decode(buf);
        log('[2] Decoded! Found ' + images.length + ' image(s)');
        if (images.length > 0) {
          var heicImg = images[0];
          var w = heicImg.get_width(), h = heicImg.get_height();
          log('[2] Dimensions: ' + w + 'x' + h);
          var canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          heicImg.display({ data: new Uint8ClampedArray(w*h*4), width: w, height: h }, function(dd) {
            if (dd) {
              var ctx = canvas.getContext('2d');
              var id = ctx.createImageData(w, h);
              id.data.set(dd.data);
              ctx.putImageData(id, 0, 0);
              canvas.style.maxWidth = '600px';
              document.body.appendChild(canvas);
              log('[2] Canvas rendered!');
              log('\nRESULT: libheif-js WORKS!');
            } else {
              log('[2] display() returned null');
              log('\nRESULT: ALL decoders failed.');
            }
          });
        }
      } catch(e) {
        log('[2] Decode error: ' + e.message);
        log('\nRESULT: ALL decoders failed.');
      }
    };
    reader.readAsArrayBuffer(file);
  };
  s.onerror = function() {
    log('[2] CDN load FAILED');
    log('\nRESULT: ALL decoders failed.');
  };
  document.head.appendChild(s);
}

document.getElementById('drop').addEventListener('click', function() { document.getElementById('fi').click(); });
document.getElementById('fi').addEventListener('change', function() { if (this.files[0]) handleFile(this.files[0]); });
document.getElementById('drop').addEventListener('dragover', function(e) { e.preventDefault(); });
document.getElementById('drop').addEventListener('drop', function(e) {
  e.preventDefault();
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
</script>
</body></html>
